<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOL 选人助手</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #0a0e1a;
    color: #c8d0e0;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  #header {
    background: linear-gradient(135deg, #0f1923 0%, #1a2332 100%);
    border-bottom: 2px solid #c8a850;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #header h1 { font-size: 18px; color: #c8a850; letter-spacing: 1px; }
  #header-meta { font-size: 12px; color: #7a8a9a; }
  #header-meta span { margin-right: 10px; }
  .badge {
    display: inline-block;
    background: #1e3a4a;
    color: #5bbfdf;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    margin-right: 6px;
  }

  /* ── Layout ── */
  #main {
    display: flex;
    gap: 0;
    height: calc(100vh - 55px);
    overflow: hidden;
  }

  /* ── Teams panel ── */
  #teams-panel {
    width: 380px;
    min-width: 340px;
    background: #0d1521;
    border-right: 1px solid #1e2a3a;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .team-section { padding: 12px 14px; }
  .team-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5a6a7a;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #1a2530;
  }
  .my-team-title { color: #4a9fd4; }
  .enemy-team-title { color: #c05050; }

  .champ-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 3px;
  }
  .champ-row:hover { background: #1a2535; }
  .champ-row.selected { background: #1a3050; border-left: 3px solid #4a9fd4; }
  .champ-row.is-me { background: #1a3050; }

  .champ-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid #2a3a4a;
    object-fit: cover;
    flex-shrink: 0;
    background: #1e2a3a;
  }
  .champ-icon.me-icon { border-color: #4a9fd4; }
  .champ-icon.enemy-icon { border-color: #c05050; }

  .champ-info { flex: 1; min-width: 0; }
  .champ-name { font-size: 13px; color: #d0d8e8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .champ-pos {
    font-size: 11px;
    color: #6a7a8a;
  }
  .champ-pos.me-pos { color: #4a9fd4; }

  .pos-select {
    background: #0f1a28;
    border: 1px solid #2a3a4a;
    color: #8a9aaa;
    border-radius: 3px;
    padding: 2px 4px;
    font-size: 11px;
    cursor: pointer;
    outline: none;
  }
  .pos-select:focus { border-color: #4a9fd4; color: #c8d0e0; }

  /* ── Controls ── */
  #controls {
    padding: 10px 14px;
    border-top: 1px solid #1a2530;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  #controls label { font-size: 12px; color: #6a7a8a; }
  #tier-select, #mode-badge {
    background: #0f1a28;
    border: 1px solid #2a3a4a;
    color: #c8d0e0;
    border-radius: 3px;
    padding: 4px 8px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }
  #refresh-btn {
    background: #1e3a50;
    border: 1px solid #4a9fd4;
    color: #4a9fd4;
    border-radius: 3px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #refresh-btn:hover { background: #254a60; }

  /* ── Advice panel ── */
  #advice-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }

  #waiting-msg {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 12px;
    color: #4a5a6a;
  }
  #waiting-msg .big-icon { font-size: 48px; }

  .section {
    margin-bottom: 20px;
    background: #0d1521;
    border: 1px solid #1e2a3a;
    border-radius: 6px;
    overflow: hidden;
  }
  .section-header {
    background: #111e2e;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: bold;
    color: #7a8aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1e2a3a;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-body { padding: 12px 14px; }

  /* ── Opponent / WR ── */
  #opp-section .section-body {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #opp-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid #c05050;
    object-fit: cover;
    background: #1e2a3a;
    flex-shrink: 0;
  }
  #opp-info { flex: 1; }
  #opp-name { font-size: 16px; color: #d8e0f0; margin-bottom: 4px; }
  #wr-display { font-size: 13px; }
  .wr-good { color: #4aaf6a; }
  .wr-bad { color: #cf5050; }
  .wr-neutral { color: #9a9aaa; }
  .sample-size { font-size: 11px; color: #5a6a7a; margin-left: 6px; }
  .stale-warn { font-size: 11px; color: #b07830; margin-left: 6px; }

  /* ── Build ── */
  .build-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .build-row:last-child { margin-bottom: 0; }
  .build-label {
    width: 36px;
    font-size: 11px;
    color: #5a6a7a;
    flex-shrink: 0;
    text-align: right;
  }
  .item-list { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .item-sep { color: #3a4a5a; font-size: 16px; }
  .item-sep-slash { color: #3a4a5a; font-size: 14px; margin: 0 2px; }

  .item-chip {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    cursor: default;
  }
  .item-img {
    width: 34px;
    height: 34px;
    border-radius: 4px;
    border: 1px solid #2a3a4a;
    object-fit: cover;
    background: #1e2a3a;
  }
  .item-img:hover { border-color: #c8a850; }
  .item-tooltip {
    position: absolute;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%);
    background: #0a1020;
    border: 1px solid #3a4a5a;
    color: #c8d0e0;
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .item-chip:hover .item-tooltip { opacity: 1; }

  .no-data { color: #4a5a6a; font-size: 12px; font-style: italic; }
  .data-source { font-size: 10px; color: #3a4a5a; margin-left: auto; }

  /* ── Runes ── */
  .rune-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .rune-tree-icon {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }
  .rune-tree-name {
    font-size: 12px;
    color: #9a8a5a;
    width: 40px;
    flex-shrink: 0;
  }
  .rune-list { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .rune-chip {
    position: relative;
    display: inline-flex;
    align-items: center;
  }
  .rune-img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #1a2030;
    object-fit: contain;
    padding: 2px;
  }
  .keystone-img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #9a7a30;
    background: #1a2030;
    object-fit: contain;
    padding: 2px;
  }
  .rune-chip .item-tooltip { bottom: 32px; }
  .stat-shard-img {
    width: 22px;
    height: 22px;
    opacity: 0.85;
    object-fit: contain;
  }
  .rune-sep { color: #2a3a4a; font-size: 12px; margin: 0 2px; }

  /* ── Tips ── */
  .tips-list { list-style: none; }
  .tips-list li {
    padding: 6px 0;
    border-bottom: 1px solid #121e2c;
    font-size: 13px;
    line-height: 1.5;
    color: #b8c4d4;
    display: flex;
    gap: 8px;
  }
  .tips-list li:last-child { border-bottom: none; }
  .tips-num { color: #4a9fd4; font-size: 12px; font-weight: bold; flex-shrink: 0; min-width: 16px; }
  .tips-loading { color: #3a5a7a; font-size: 12px; font-style: italic; }
  .tips-error { color: #9a5050; font-size: 12px; }

  .comp-list li { border-color: #1a2c1a; }
  .comp-num { color: #4aaf6a; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #2a3a5a;
    border-top-color: #4a9fd4;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0a0e1a; }
  ::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <h1>LOL 选人助手</h1>
  <div id="header-meta">
    <span id="hdr-version">—</span>
    <span id="hdr-mode">—</span>
    <span id="hdr-status"></span>
  </div>
</div>

<div id="main">
  <!-- Left: Teams -->
  <div id="teams-panel">
    <div class="team-section">
      <div class="team-title my-team-title">我方阵容</div>
      <div id="my-team-list"></div>
    </div>
    <div class="team-section">
      <div class="team-title enemy-team-title">敌方阵容</div>
      <div id="enemy-team-list"></div>
    </div>
    <div id="controls">
      <label>段位</label>
      <select id="tier-select">
        <option value="emerald_plus">翡翠+</option>
        <option value="diamond_plus">钻石+</option>
        <option value="master_plus">大师+</option>
        <option value="platinum_plus">铂金+</option>
        <option value="gold_plus">黄金+</option>
        <option value="all">全段位</option>
      </select>
      <button id="refresh-btn">刷新建议</button>
    </div>
  </div>

  <!-- Right: Advice -->
  <div id="advice-panel">
    <div id="waiting-msg">
      <div class="big-icon">⚔</div>
      <div>选择英雄后将自动加载建议</div>
    </div>
    <div id="advice-content" style="display:none">
      <!-- Opponent -->
      <div class="section" id="opp-section">
        <div class="section-header">▶ 对线对手</div>
        <div class="section-body">
          <img id="opp-avatar" src="" alt="">
          <div id="opp-info">
            <div id="opp-name">—</div>
            <div id="wr-display">对位胜率：暂无数据</div>
          </div>
        </div>
      </div>

      <!-- Build -->
      <div class="section">
        <div class="section-header">
          ▶ 推荐出装
          <span class="data-source" id="build-source"></span>
        </div>
        <div class="section-body" id="build-body">
          <div class="no-data">加载中… <span class="spinner"></span></div>
        </div>
      </div>

      <!-- Runes -->
      <div class="section">
        <div class="section-header">
          ▶ 符文天赋
          <span class="data-source" id="runes-source"></span>
        </div>
        <div class="section-body" id="runes-body">
          <div class="no-data">加载中… <span class="spinner"></span></div>
        </div>
      </div>

      <!-- Tips -->
      <div class="section">
        <div class="section-header">▶ 对线注意点 <span class="spinner" id="tips-spinner"></span></div>
        <div class="section-body">
          <ul class="tips-list" id="tips-lane"><li><span class="tips-loading">Claude 生成中…</span></li></ul>
        </div>
      </div>

      <!-- Teamfight -->
      <div class="section">
        <div class="section-header">▶ 团战分析</div>
        <div class="section-body">
          <ul class="tips-list" id="tips-teamfight"><li><span class="tips-loading">Claude 生成中…</span></li></ul>
        </div>
      </div>

      <!-- Comp adjust -->
      <div class="section" id="comp-section">
        <div class="section-header">▶ 阵容出装调整</div>
        <div class="section-body">
          <ul class="tips-list comp-list" id="tips-comp"><li><span class="tips-loading">Claude 生成中…</span></li></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/web/app.js"></script>
</body>
</html>
